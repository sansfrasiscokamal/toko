<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-tiktok { background-color: #000; color: #fff; border: none; }
        .btn-shopee { background-color: #ee4d2d; color: #fff; border: none; }
        .btn-wa { background-color: #25d366; color: #fff; border: none; }
        .btn-tiktok:hover, .btn-shopee:hover, .btn-wa:hover { color: #fff; opacity: 0.8; }
        
        /* FIX UTAMA CSS: Memaksa gambar mengikuti rasio kotak pembungkusnya secara penuh */
        .carousel-item .ratio img { 
            width: 100% !important; 
            height: 100% !important; 
            object-fit: contain !important; 
        }
        
        .carousel-control-prev-icon, .carousel-control-next-icon { background-color: rgba(0,0,0,0.6); border-radius: 50%; }
        .desc-section { background: #fff; border-radius: 12px; padding: 15px; border: 1px solid #eee; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4" style="max-width: 600px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="index.html" class="btn btn-sm btn-secondary rounded-pill px-3">← Kembali</a>
        <button class="btn btn-sm btn-link text-decoration-none fw-bold" onclick="copyLink()">🔗 Salin Link</button>
    </div>

    <div id="productCarousel" class="carousel slide rounded-4 shadow overflow-hidden" data-bs-ride="false">
        <div class="carousel-inner" id="carouselContent"></div>
        <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
        <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
    </div>

    <h2 id="productName" class="mt-4 fw-bold"></h2>
    <div class="price-section mt-2">
      <h4 id="productPrice" class="text-danger fw-bold mb-0"></h4>
      <small id="productGrosir" class="text-success"></small>
      <div class="mt-1">
        <small id="productMinOrder" class="text-muted fw-bold d-block" style="font-size: 0.8rem;"></small>
      </div>
    </div>
    <div class="desc-section mt-3 shadow-sm">
        <p class="fw-bold mb-1" style="font-size: 0.9rem;">Deskripsi Produk:</p>
        <p id="productprice" class="text-muted small mb-0 fw-bold d-none"></p> 
        <p id="productDesc" class="text-muted small mb-0" style="white-space: pre-line;"></p>
        
        <div id="descCarousel" class="carousel slide rounded-3 shadow-sm overflow-hidden mt-3 d-none" data-bs-ride="false">
            <div class="carousel-inner" id="descCarouselContent"></div>
        </div>
    </div>

    <div class="row g-2 mt-3">
        <div class="d-flex align-items-center flex-nowrap mt-2 px-1" style="gap: 15px;">
          <div id="containerTerjualTiktok" style="display: none !important; min-width: max-content; margin-left: 10px;margin-bottom:-15px">
              <span id="textTerjualTiktok" class="text-muted text-nowrap" style="font-size: 0.7rem; font-weight: 500;"></span>
          </div>
      
          <div id="containerTerjualShopee" style="display: none !important; min-width: max-content; margin-left: 25px; margin-bottom:-15px">
              <span id="textTerjualShopee" class="text-muted text-nowrap" style="font-size: 0.7rem; font-weight: 500;"></span>
          </div>
        </div>
        <div class="col-4"></div>
    </div>

    <div class="row g-2 mt-1 text-center">
        <div class="col-4">
            <a href="#" id="linkTiktok" target="_blank" class="btn btn-tiktok w-100 py-2 rounded-3 shadow-sm fw-bold" style="font-size: 0.75rem;">Beli di Tiktok</a>
        </div>
        <div class="col-4">
            <a href="#" id="linkShopee" target="_blank" class="btn btn-shopee w-100 py-2 rounded-3 shadow-sm fw-bold" style="font-size: 0.75rem;">Beli di Shopee</a>
        </div>
        <div class="col-4">
            <a href="#" id="linkWA_small" target="_blank" class="btn btn-wa w-100 py-2 rounded-3 shadow-sm fw-bold" style="font-size: 0.75rem;">Beli via WA</a>
        </div>
    </div>

    <div class="mt-4">
        <a href="#" id="linkWA_big" target="_blank" class="btn btn-wa w-100 py-3 fw-bold rounded-pill shadow">
            Tanya via WhatsApp
        </a>
    </div>
</div>

<script src="products.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    const product = allProducts.find(p => p.id == productId) || allProducts[0];

    // Isi Konten Teks
    document.getElementById('productName').innerText = product.name;
    
    const formattedPrice = `Rp ${product.price.toLocaleString("id-ID")}`;
    document.getElementById('productPrice').innerText = formattedPrice;
    
    const grosir_el = document.getElementById('productGrosir');
    const minOrder_el = document.getElementById('productMinOrder');

    // Kondisi untuk Harga Grosir
    if (product.grosirPrice && product.grosirPrice > 0) {
        grosir_el.innerText = `Harga Grosir Rp ${product.grosirPrice.toLocaleString("id-ID")}`;
        grosir_el.style.display = "block"; 
    } else {
        grosir_el.style.display = "none";  
    }
    
    // Kondisi untuk Minimal Order
    if (product.minOrder && product.minOrder > 0) {
        minOrder_el.innerText = ` Minimal Pembelian Grosir: ${product.minOrder} Pcs`;
        minOrder_el.style.display = "block"; 
    } else {
        minOrder_el.style.display = "none";  
    }
    
    document.getElementById('productDesc').innerText = product.description;
    document.getElementById('productDesc').innerText = product.description;
    
document.getElementById('productDesc').innerText = product.description;
    
document.getElementById('productDesc').innerText = product.description; //
    
    // 🌟 LOGIKA BARU: Render Carousel Gambar Deskripsi
    const descCarouselEl = document.getElementById('descCarousel');
    const descCarouselContent = document.getElementById('descCarouselContent');
    descCarouselContent.innerHTML = ""; 
    // Cek apakah produk memiliki array descImages dan ada isinya
    if (product.descImages && product.descImages.length > 0) {
        // Munculkan container carousel
        descCarouselEl.classList.remove('d-none');
        
        product.descImages.forEach((img, index) => {
            descCarouselContent.innerHTML += `
                <div class="carousel-item ${index === 0 ? 'active' : ''}">
                    <div class="ratio ratio-1x1" style="background-color: #f8f9fa;">
                        <img src="${img}" class="w-100 h-100" style="object-fit: contain;" onerror="this.src='https://placehold.co/600x600?text=Detail+${index+1}'}">
                    </div>
                </div>
            `;
        });
    } else {
        // Sembunyikan jika tidak ada gambar deskripsi
        descCarouselEl.classList.add('d-none');
    }
    
    // 🌟 LOGIKA BARU: Cek data terjualtiktok & terjualshopee secara dinamis
    const containerTT = document.getElementById('containerTerjualTiktok');
    const textTT = document.getElementById('textTerjualTiktok');
    if (product.terjualtiktok) {
        textTT.innerText = `Disini ${product.terjualtiktok} Terjual`;
        containerTT.style.setProperty('display', 'flex', 'important');
    } else {
        containerTT.style.setProperty('display', 'none', 'important');
    }

    const containerSP = document.getElementById('containerTerjualShopee');
    const textSP = document.getElementById('textTerjualShopee');
    if (product.terjualshopee) {
        textSP.innerText = `Disini ${product.terjualshopee} Terjual`;
        containerSP.style.setProperty('display', 'flex', 'important');
    } else {
        containerSP.style.setProperty('display', 'none', 'important');
    }

    // Mengisi Link Tujuan
    document.getElementById('linkTiktok').href = product.links.tiktok;
    document.getElementById('linkShopee').href = product.links.shopee;
    document.getElementById('linkWA_small').href = product.links.wa;
    document.getElementById('linkWA_big').href = product.links.wa;

    // Render Gambar Carousel secara aman
    const carouselContent = document.getElementById('carouselContent');
    carouselContent.innerHTML = ""; 
    
    if (product.images && product.images.length > 0) {
        product.images.forEach((img, index) => {
            carouselContent.innerHTML += `
                <div class="carousel-item ${index === 0 ? 'active' : ''}">
                    <div class="ratio ratio-1x1" style="background-color: #f8f9fa;">
                        <img src="${img}" onerror="this.src='https://placehold.co/600x600?text=Produk+${index+1}'}">
                    </div>
                </div>
            `;
        });
    }

    setTimeout(() => {
        // Inisialisasi Carousel Atas (Utama)
        const myCarouselEl = document.getElementById('productCarousel'); //
        if (myCarouselEl) {
            const existingInstance = bootstrap.Carousel.getInstance(myCarouselEl); //
            if (existingInstance) { existingInstance.dispose(); } //
            new bootstrap.Carousel(myCarouselEl, { touch: true, interval: false }); //
        }

        // 🌟 Tambahkan ini untuk Inisialisasi Carousel Deskripsi (Bawah)
        const descCarouselElObj = document.getElementById('descCarousel');
        if (descCarouselElObj) {
            const existingDescInstance = bootstrap.Carousel.getInstance(descCarouselElObj);
            if (existingDescInstance) { existingDescInstance.dispose(); }
            new bootstrap.Carousel(descCarouselElObj, { touch: true, interval: false });
        }
    }, 100); //

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        alert("Link produk disalin!");
    }
</script>
</body>
</html>
